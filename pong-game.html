<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: black;
        }
        canvas {
            background: #eee;
            border: 1px solid #000;
        }
    </style>
</head>
<body>
    <canvas id="pong" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('pong');
        const ctx = canvas.getContext('2d');

        // Create the pong paddle
        const paddleWidth = 10;
        const paddleHeight = 100;

        const player = {
            x: 0,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            color: "blue",
            score: 0,
        };

        const computer = {
            x: canvas.width - paddleWidth,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            color: "red",
            score: 0,
        };

        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 10,
            speed: 4,
            velocityX: 4,
            velocityY: 4,
            color: "green",
        };

        // Draw text
        function drawText(text, x, y) {
            ctx.fillStyle = '#fff';
            ctx.font = '45px fantasy';
            ctx.fillText(text, x, y);
        }

        // Draw the paddle and ball
        function draw() {
            // Clear the canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw paddles
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = computer.color;
            ctx.fillRect(computer.x, computer.y, computer.width, computer.height);
            // Draw the ball
            ctx.fillStyle = ball.color;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2, false);
            ctx.closePath();
            ctx.fill();
            // Draw scores
            drawText(player.score, canvas.width / 4, canvas.height / 5);
            drawText(computer.score, 3 * canvas.width / 4, canvas.height / 5);
        }

        // Control paddles
        canvas.addEventListener('mousemove', (event) => {
            let rect = canvas.getBoundingClientRect();
            player.y = event.clientY - rect.top - player.height / 2;
            if (player.y < 0) player.y = 0;
            if (player.y + player.height > canvas.height) player.y = canvas.height - player.height;
        });

        // Reset the ball
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speed = 4;
            ball.velocityX = -ball.velocityX;
        }

        // Update the game
        function update() {
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;
            // Ball collision with top and bottom
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.velocityY = -ball.velocityY;
            }
            // Ball collision with paddles
            let playerPaddle = (ball.x < canvas.width / 2) ? player : computer;
            if (collision(ball, playerPaddle)) {
                ball.velocityX = -ball.velocityX;
                ball.speed += 0.1;
            }
            // Ball out of bounds
            if (ball.x - ball.radius < 0) {
                computer.score++;
                resetBall();
            } else if (ball.x + ball.radius > canvas.width) {
                player.score++;
                resetBall();
            }
            // Computer AI
            computer.y += (ball.y - (computer.y + computer.height / 2)) * 0.1;
        }

        // Collision detection
        function collision(ball, paddle) {
            return ball.x < paddle.x + paddle.width &&
                   ball.x + ball.radius > paddle.x &&
                   ball.y < paddle.y + paddle.height &&
                   ball.y + ball.radius > paddle.y;
        }

        // Game loop
        function game() {
            draw();
            update();
            requestAnimationFrame(game);
        }

        // Start the game
        game();
    </script>
</body>
</html>
