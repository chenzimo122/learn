<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        canvas {
            background: black;
            display: block;
            margin: auto;
        }
    </style>
</head>
<body>
    <canvas id="pong" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('pong');
        const ctx = canvas.getContext('2d');

        let player1Score = 0;
        let player2Score = 0;
        let winningScore = 11;
        let isGameOver = false;
        let isPaused = false;

        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 10,
            speed: 4,
            dx: 4,
            dy: 4
        };

        const paddleWidth = 10, paddleHeight = 100;
        const player1 = { x: 0, y: (canvas.height - paddleHeight) / 2, width: paddleWidth, height: paddleHeight }; 
        const player2 = { x: canvas.width - paddleWidth, y: (canvas.height - paddleHeight) / 2, width: paddleWidth, height: paddleHeight }; 

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = 4 * (Math.random() > 0.5 ? 1 : -1);
            ball.dy = 4 * (Math.random() > 0.5 ? 1 : -1);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.fillRect(player1.x, player1.y, player1.width, player1.height);
            ctx.fillRect(player2.x, player2.y, player2.width, player2.height);
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.font = '35px Arial';
            ctx.fillText(player1Score, canvas.width / 4, canvas.height / 5);
            ctx.fillText(player2Score, (canvas.width * 3) / 4, canvas.height / 5);

            if (isGameOver) {
                ctx.fillText('Game Over', canvas.width / 2 - 100, canvas.height / 2);
                ctx.fillText('Press R to Restart', canvas.width / 2 - 130, canvas.height / 2 + 40);
            }
        }

        function update() {
            if (isPaused || isGameOver) return;

            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ball Collision with top and bottom
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.dy *= -1;
            }

            // Ball Collision with paddles
            if (ball.x - ball.radius < player1.x + player1.width && ball.y > player1.y && ball.y < player1.y + player1.height) {
                ball.dx *= -1;
            }
            else if (ball.x + ball.radius > player2.x && ball.y > player2.y && ball.y < player2.y + player2.height) {
                ball.dx *= -1;
            }

            // Check if ball is out of bounds
            if (ball.x + ball.radius < 0) {
                player2Score++;
                if (player2Score === winningScore) {
                    isGameOver = true;
                    alert('Player 2 Wins!');
                }
                resetBall();
            } else if (ball.x - ball.radius > canvas.width) {
                player1Score++;
                if (player1Score === winningScore) {
                    isGameOver = true;
                    alert('Player 1 Wins!');
                }
                resetBall();
            }
        }

        function pauseResumeGame() {
            isPaused = !isPaused;
        }

        function restartGame() {
            player1Score = 0;
            player2Score = 0;
            isGameOver = false;
            resetBall();
        }

        function keydownHandler(event) {
            switch (event.key) {
                case 'ArrowUp':
                    if (player2.y > 0) player2.y -= 20;
                    break;
                case 'ArrowDown':
                    if (player2.y < canvas.height - paddleHeight) player2.y += 20;
                    break;
                case 'w':
                    if (player1.y > 0) player1.y -= 20;
                    break;
                case 's':
                    if (player1.y < canvas.height - paddleHeight) player1.y += 20;
                    break;
                case ' ': // SPACE key
                    pauseResumeGame();
                    break;
                case 'r':
                    if (isGameOver) restartGame();
                    break;
            }
        }

        document.addEventListener('keydown', keydownHandler);

        function gameLoop() {
            draw();
            update();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
